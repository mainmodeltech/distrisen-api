services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-distrisen_db}
      POSTGRES_USER: ${POSTGRES_USER:-distrisen_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - distrisen_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-distrisen_admin} -d ${POSTGRES_DB:-distrisen_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Adminer ─────────────────────────────────────────────────
  adminer:
    image: adminer:4-standalone
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - distrisen_net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API Node.js — Taux de Change ────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      API_KEY: ${API_KEY}
      NODE_ENV: production
    networks:
      - distrisen_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  distrisen_net:
    driver: bridge

volumes:
  postgres_data:
